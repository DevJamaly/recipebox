<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link
      href="https://fonts.googleapis.com/css?family=Nunito+Sans:400,600,700"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="src/img/recipebox-favicon.svg"
      type="image/x-icon"
    />

    <link rel="stylesheet" href="src/sass/main.scss" />
    <script type="module" src="src/js/controller.js"></script>

    <title>RecipeBox // Search over 1,000,000 recipes</title>
  </head>

  <body>
    <div class="container">
      <header class="header">
        <a href="" class="header__logo-link">
          <img
            src="src/img/recipebox-logo.svg"
            alt="Logo"
            class="header__logo"
          />
        </a>

        <form class="search">
          <input
            type="text"
            class="search__field"
            placeholder="Search over 1,000,000 recipes..."
          />
          <button class="btn search__btn">
            <svg class="search__icon">
              <use href="src/img/icons.svg#icon-search"></use>
            </svg>
            <span>Search</span>
          </button>
        </form>

        <nav class="nav">
          <ul class="nav__list">
            <li class="nav__item">
              <button class="nav__btn nav__btn--add-recipe">
                <svg class="nav__icon">
                  <use href="src/img/icons.svg#icon-edit"></use>
                </svg>
                <span>Add recipe</span>
              </button>
            </li>
            <li class="nav__item">
              <button class="nav__btn nav__btn--bookmarks">
                <svg class="nav__icon">
                  <use href="src/img/icons.svg#icon-bookmark"></use>
                </svg>
                <span>Bookmarks</span>
              </button>
              <div class="bookmarks">
                <ul class="bookmarks__list">
                  <div class="message">
                    <div>
                      <svg>
                        <use href="src/img/icons.svg#icon-smile"></use>
                      </svg>
                    </div>
                    <p>
                      No bookmarks yet. Find a nice recipe and bookmark it :)
                    </p>
                  </div>
                </ul>
              </div>
            </li>
          </ul>
        </nav>
      </header>

      <div class="search-results">
        <ul class="results"></ul>

        <div class="pagination"></div>
      </div>

      <div class="recipe">
        <div class="message">
          <div>
            <svg>
              <use href="src/img/icons.svg#icon-smile"></use>
            </svg>
          </div>
          <p>Start by searching for a recipe or an ingredient. Have fun!</p>
        </div>
      </div>
    </div>

    <div class="overlay hidden"></div>
    <div class="add-recipe-window hidden">
      <button class="btn--close-modal">&times;</button>
      <form class="upload">
        <div class="upload__column">
          <h3 class="upload__heading">Recipe data</h3>
          <label>Title</label>
          <input name="title" type="text" />
          <label>URL</label>
          <input name="sourceUrl" type="text" />
          <label>Image URL</label>
          <input name="image" type="text" />
          <label>Publisher</label>
          <input name="publisher" type="text" />

          <label>Prep time</label>
          <div class="upload__time-group">
            <input
              type="number"
              name="prepTimeHours"
              placeholder="hrs"
              min="0"
            />
            <span class="upload__time-sep">:</span>
            <input
              type="number"
              name="prepTimeMinutes"
              placeholder="min"
              min="0"
            />
          </div>

          <label>Servings</label>
          <input type="number" name="servings" min="1" />
        </div>

        <div class="upload__column">
          <h3 class="upload__heading">Ingredients</h3>

          <ul class="ingredients-list">
            <li class="ingredient-row">
              <input
                type="number"
                step="any"
                min="1"
                class="ingredient__qty"
                placeholder="Qty"
              />
              <input type="text" class="ingredient__unit" placeholder="Unit" />
              <input
                type="text"
                class="ingredient__description"
                placeholder="Description"
              />
              <div
                class="ingredient__delete"
                role="button"
                aria-label="Remove ingredient"
              >
                <svg class="ingredient__delete-icon">
                  <use href="src/img/icons.svg#icon-trash"></use>
                </svg>
              </div>
            </li>
          </ul>
          <button type="button" class="btn--add-ingredient">
            <svg><use href="src/img/icons.svg#icon-plus"></use></svg>
            Add ingredient
          </button>
        </div>

        <p class="upload__error"></p>

        <button class="btn upload__btn">
          <svg><use href="src/img/icons.svg#icon-upload-cloud"></use></svg>
          <span>Upload</span>
        </button>
      </form>
    </div>
  </body>
</html>
